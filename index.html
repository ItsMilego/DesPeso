<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Sobrepeso 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#090c14;--surf:#0f1320;--card:#141928;--border:#1c2236;
  --cyan:#00d4ff;--green:#00e5a0;--red:#ff4d4d;
  --text:#ffffff;--text2:#7a82a0;--muted:#2a3050;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
header{padding:14px 32px;background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:300;flex-wrap:wrap;}
.logo{width:36px;height:36px;background:var(--cyan);border-radius:9px;display:flex;
  align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;
  font-size:13px;color:#090c14;flex-shrink:0;}
.hinfo h1{font-size:16px;font-weight:700;color:var(--cyan);}
.hinfo p{font-size:10px;color:var(--text2);margin-top:1px;}
.spacer{flex:1;}
.pill{font-family:var(--mono);font-size:10px;color:var(--cyan);
  background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.18);
  border-radius:16px;padding:4px 11px;white-space:nowrap;}
.header-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.meta-chip{display:flex;flex-direction:column;align-items:flex-start;
  background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.14);
  border-radius:9px;padding:4px 11px;min-width:100px;}
.meta-chip-label{font-size:8px;font-family:var(--mono);color:var(--text2);
  text-transform:uppercase;letter-spacing:1.4px;margin-bottom:2px;}
.meta-chip-val{font-size:10px;font-family:var(--mono);color:var(--cyan);font-weight:700;
  max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.srchbar{padding:18px 32px;background:var(--surf);border-bottom:1px solid var(--border);}
.slabel{font-size:9px;font-family:var(--mono);color:var(--cyan);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:7px;}
.srow{display:flex;gap:8px;}
.acwrap{position:relative;flex:1;}
.sinput{width:100%;background:#fff;border:1.5px solid var(--border);color:#111;
  font-family:var(--mono);font-size:14px;padding:10px 14px;border-radius:8px;outline:none;
  letter-spacing:.7px;transition:border-color .2s;}
.sinput:focus{border-color:var(--cyan);}
.sinput::placeholder{color:#999;font-size:12px;letter-spacing:0;}
.sbtn{background:var(--cyan);color:#090c14;font-family:var(--sans);font-weight:700;
  font-size:12px;padding:0 20px;border:none;border-radius:8px;cursor:pointer;}
.sbtn:hover{opacity:.82;}
.drop{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;
  background:var(--card);border:1.5px solid var(--border);border-radius:8px;
  max-height:220px;overflow-y:auto;display:none;}
.drop.open{display:block;}
.di{padding:8px 12px;cursor:pointer;font-size:11px;display:flex;gap:9px;align-items:center;
  border-bottom:1px solid var(--border);}
.di:last-child{border-bottom:none;}
.di:hover{background:rgba(0,212,255,.06);}
.di-c{font-family:var(--mono);font-size:10px;color:var(--cyan);min-width:105px;}
.di-d{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
main{padding:22px 32px;display:flex;flex-direction:column;gap:22px;}
.st{font-size:9px;font-family:var(--mono);color:var(--cyan);text-transform:uppercase;
  letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.st::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.chart-wrap{position:relative;height:230px;}
.chart-wrap-rank{position:relative;}
.krow{display:flex;gap:11px;flex-wrap:wrap;margin-top:14px;}
.kpi{background:var(--surf);border:1px solid var(--border);border-radius:9px;
  padding:12px 16px;min-width:130px;flex:1;}
.kpi-l{font-size:8px;font-family:var(--mono);color:var(--cyan);text-transform:uppercase;
  letter-spacing:1.2px;margin-bottom:4px;}
.kpi-v{font-size:20px;font-weight:700;color:#fff;font-family:var(--mono);}
.kpi-sub{font-size:9px;color:#ffffff;margin-top:2px;}
.ppos{color:var(--green);}
.pneg{color:var(--red);}
.pcode{font-family:var(--mono);font-size:11px;color:var(--cyan);margin-bottom:4px;}
.pdesc{font-size:17px;font-weight:700;color:#fff;}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{text-align:left;padding:9px 12px;font-size:8.5px;font-family:var(--mono);color:var(--cyan);
  text-transform:uppercase;letter-spacing:1px;background:var(--surf);border-bottom:1px solid var(--border);}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:#fff;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(0,212,255,.02);}
.num{font-family:var(--mono);}
.tppos{color:var(--green);font-family:var(--mono);font-weight:700;}
.tpneg{color:var(--red);font-family:var(--mono);font-weight:700;}
.tpneu{color:var(--text2);font-family:var(--mono);}
.nodata{text-align:center;padding:28px;color:var(--text2);font-size:13px;}
tr.code-hl td{background:rgba(0,212,255,.07);}
tr.code-hl td:first-child{border-left:2px solid var(--cyan);}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:860px){.twocol{grid-template-columns:1fr;}}

/* lista lineas */
.litem{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.litem:last-child{border-bottom:none;}
.litem:hover,.litem.sel{background:rgba(0,212,255,.06);}
.lname{flex:1;min-width:0;}
.ln-title{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ln-sub{font-size:9px;color:var(--text2);margin-top:1px;font-family:var(--mono);}

/* barra con label al final */
.lbar-outer{position:relative;width:100%;height:18px;background:var(--border);border-radius:4px;margin-top:5px;overflow:visible;}
.lbar-inner{height:100%;border-radius:4px;transition:width .3s;}
.lbar-label{position:absolute;left:calc(100% + 6px);top:50%;transform:translateY(-50%);
  font-size:9px;font-family:var(--mono);font-weight:700;white-space:nowrap;}

.lpct{font-family:var(--mono);font-size:12px;font-weight:700;text-align:right;white-space:nowrap;}
.lbu{font-family:var(--mono);font-size:9px;color:var(--text2);text-align:right;}
.lmeta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;margin-left:8px;padding-top:2px;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:240px;gap:12px;color:var(--muted);}
.empty p{font-size:13px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}



/* Modal de carga */

.upmodal-overlay.open{display:flex;}







.dropzone-text strong{color:#fff;}



.upbtn-cancel:hover{opacity:.8;}

.upbtn-ok:hover{opacity:.85;}
.upbtn-ok:disabled{opacity:.4;cursor:not-allowed;}


.up-status.ok{color:var(--green);}
.up-status.err{color:var(--red);}

/* Full-width search row overrides */
.srchbar{width:100% !important;max-width:none !important;box-sizing:border-box;}
.srow{width:100% !important;max-width:none !important;}
.srow .acwrap{flex:1 1 0 !important;max-width:none !important;min-width:200px;}
.srow .sinput{width:100% !important;box-sizing:border-box;}
/* Gauge responsive */
@media(max-width:768px){
  .srow{flex-wrap:wrap !important;}
  #gaugeWrap{width:100%;margin-top:10px;margin-left:0 !important;}
}

</style>
</head>

</div>

const inp=document.getElementById('searchInput'), dd=document.getElementById('dropdown');
function getMatches(q){
  q=q.toLowerCase();
  return Object.entries(CODES).filter(([c,d])=>c.toLowerCase().includes(q)||(d||'').toLowerCase().includes(q)).slice(0,12);
}
inp.addEventListener('input',()=>{
  const q=inp.value.trim();
  if(q.length<2){dd.classList.remove('open');return;}
  const m=getMatches(q);
  if(!m.length){dd.classList.remove('open');return;}
  dd.innerHTML=m.map(([c,d])=>`<div class="di" onclick="selectCode('${c}')"><span class="di-c">${c}</span><span class="di-d">${d||'—'}</span></div>`).join('');
  dd.classList.add('open');
});
document.addEventListener('click',e=>{if(!e.target.closest('.acwrap'))dd.classList.remove('open');});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'){dd.classList.remove('open');doSearch();}});
function selectCode(c){inp.value=c;dd.classList.remove('open');renderCode(c);}
function doSearch(){
  const q=inp.value.trim();if(!q)return;
  if(HIST[q]!==undefined){renderCode(q);return;}
  const m=getMatches(q);
  if(m.length){renderCode(m[0][0]);return;}
  document.getElementById('main').innerHTML=`<div class="empty"><p>No se encontró "<strong>${q}</strong>"</p></div><div id="lineaSection"></div>`;
  renderLineas();
}

/* ── Gauge (velocímetro SPAC — aguja = Promedio) ───────── */
var SPAC_DATA = APPDATA.spac || {};
function drawGauge(code) {
  var wrap = document.getElementById('gaugeWrap');
  var cv  = document.getElementById('gaugeCV');
  var lb  = document.getElementById('gaugeLbl');
  var pctEl = document.getElementById('gaugePct');
  if (!wrap || !cv) return;
  var s = SPAC_DATA[code];
  var h = (APPDATA.historico || {})[code];
  if (!s || s.opt == null || !h) { wrap.style.display = 'none'; return; }
  var prom = s.prom;
  if (prom == null) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  var cx = W / 2, cy = H - 14, R = 72;
  var lie = s.lie != null ? s.lie : s.opt * 0.91;
  var lse = s.lse != null ? s.lse : s.opt * 1.09;
  var opt = s.opt;
  var pad = (lse - lie) * 0.35;
  var mn = lie - pad, mx = lse + pad;
  function ang(v) { return Math.PI + ((v - mn) / (mx - mn)) * Math.PI; }
  ctx.lineWidth = 16;
  var segs = [
    [mn, lie, '#e74c3c'],
    [lie, opt - (opt - lie) * 0.08, '#f39c12'],
    [opt - (opt - lie) * 0.08, opt + (lse - opt) * 0.08, '#27ae60'],
    [opt + (lse - opt) * 0.08, lse, '#f39c12'],
    [lse, mx, '#e74c3c']
  ];
  for (var i = 0; i < segs.length; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, R, ang(segs[i][0]), ang(segs[i][1]));
    ctx.strokeStyle = segs[i][2];
    ctx.stroke();
  }
  var na = ang(Math.max(mn, Math.min(mx, prom)));
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(na+Math.PI/2);
  ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(0, -(R - 18)); ctx.lineTo(4, 0); ctx.closePath();
  ctx.fillStyle = '#00d4ff'; ctx.fill(); ctx.restore();
  ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fillStyle = '#00d4ff'; ctx.fill();
  ctx.font = '11px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#ffffff';
  var aLie = ang(lie), aLse = ang(lse);
  ctx.fillText(lie.toFixed(1), cx + (R + 18) * Math.cos(aLie), cy + (R + 18) * Math.sin(aLie));
  ctx.fillText(lse.toFixed(1), cx + (R + 18) * Math.cos(aLse), cy + (R + 18) * Math.sin(aLse));
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 12px sans-serif';
  ctx.fillText('OPT ' + opt.toFixed(1) + 'g', cx, cy - R + 28);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif';
  ctx.fillText(prom.toFixed(2) + 'g', cx, cy - 16);
  ctx.fillStyle = '#ffffff'; ctx.font = '10px sans-serif';
  ctx.fillText((s.tipo||'Promedio SPAC'), cx, cy - 4);
  var pctDist = s.pct;
  if (pctDist == null && opt != 0) pctDist = ((prom - opt) / opt) * 100;
  var pctColor = '#27ae60';
  if (pctDist > 0.5) pctColor = '#e74c3c';
  else if (pctDist < -0.5) pctColor = '#f39c12';
  pctEl.style.color = pctColor;
  var absP = Math.abs(pctDist).toFixed(2);
  if (pctDist > 0.01) {
    pctEl.innerHTML = '⬆ +' + absP + '% sobre el óptimo';
  } else if (pctDist < -0.01) {
    pctEl.innerHTML = '⬇ -' + absP + '% bajo el óptimo';
  } else {
    pctEl.innerHTML = '✔ En el peso óptimo';
  }
  lb.innerHTML = 'L.I.E.: ' + lie.toFixed(1) + 'g · Óptimo: ' + opt.toFixed(1) + 'g · L.S.E.: ' + lse.toFixed(1) + 'g';
}

// =================== LINEAS ===================
function renderLineas(){
  if(!LINEAS.length)return;
  LINEAS.sort((a,b)=>b.avg_desvio-a.avg_desvio);
  const maxPos=Math.max(...LINEAS.map(l=>l.avg_desvio>0?l.avg_desvio:0),0.001);
  const maxAbsKg=Math.max(...LINEAS.map(l=>Math.abs(l.total_kg)),1);
  const maxAbs=Math.max(...LINEAS.map(x=>Math.abs(x.avg_desvio)),0.001);
  const maxAbsCosto=Math.max(...LINEAS.map(x=>Math.abs(x.total_costo||0)),1);
  function fmtVal(v){var neg=v<0?'-':'';var a=Math.round(Math.abs(v));var s=a.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');return '$ '+neg+s;}
  const listHTML=LINEAS.map((l,i)=>{
    const pct=l.avg_desvio;
    const bw=Math.round((Math.abs(pct)/maxAbs)*100);
    const bc=getGradColor(pct>0?pct:0, maxPos);
    const pctColor=pct>=0?'var(--green)':'var(--red)';
    const costo=l.total_costo||0;
    const vw=Math.round((Math.abs(costo)/maxAbsCosto)*100);
    const vColor=costo<0?'#f39c12':'#27ae60';
    return `<div class="litem ${i===0?'sel':''}" onclick="selLinea(${i},this)">
      <div class="lname" style="flex:1">
        <div class="ln-title">${l.linea}</div>
        <div style="position:relative;margin-top:6px;padding-right:68px">
          <div style="background:var(--border);border-radius:4px;height:14px;overflow:hidden">
            <div style="width:${bw}%;height:100%;border-radius:4px;background:${bc};"></div>
          </div>
          <span style="position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:9.5px;font-family:var(--mono);font-weight:700;color:${pctColor};white-space:nowrap">${fmtPct(pct)}</span>
        </div>
        <div style="position:relative;margin-top:3px;padding-right:120px">
          <div style="background:var(--border);border-radius:3px;height:10px;overflow:hidden">
            <div style="width:${vw}%;height:100%;border-radius:3px;background:${vColor};opacity:0.85"></div>
          </div>
          <span style="position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:8.5px;font-family:var(--mono);font-weight:600;color:${vColor};white-space:nowrap">${fmtVal(costo)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('lineaSection').innerHTML=`
    <div class="st">% Desvío promedio por línea</div>
    <div class="twocol">
      <div class="tcard" style="max-height:520px;overflow-y:auto">${listHTML}</div>
      <div id="lineaDet"></div>
    </div>`;
  selLinea(0,document.querySelector('.litem'));
}

function renderLineaBar(maxPos){
  if(chartLinBar)chartLinBar.destroy();
  const el=document.getElementById('lineaBar');if(!el)return;

  // Ordenar por KG acumulado de MAYOR a MENOR (ascendente para indexAxis:'y' = mayor arriba)
  const sorted=[...LINEAS].sort((a,b)=>a.total_kg-b.total_kg);

  // Altura dinámica: 38px por línea, mínimo 300px
  el.parentElement.style.height = Math.max(300, sorted.length * 42) + 'px';

  const labels=sorted.map(l=>l.linea);
  const vals=sorted.map(l=>+l.total_kg);
  const pcts=sorted.map(l=>l.avg_desvio);
  const mp=Math.max(...vals.filter(v=>v>0),0.001);
  const colors=vals.map(v=>getGradColor(v>0?v:0,mp));

  // KG acumulado al final de cada barra
  const kgPlugin={id:'kgEnd',afterDatasetDraw(chart){
    const {ctx}=chart;
    chart.getDatasetMeta(0).data.forEach((bar,i)=>{
      const kg=vals[i];
      const lbl=(kg>=0?'+':'')+fmtN(kg)+' kg';
      ctx.save();
      ctx.font='bold 9px Space Mono';
      ctx.fillStyle='rgba(255,255,255,0.93)';
      ctx.textBaseline='middle';
      if(kg>=0){ctx.textAlign='left';ctx.fillText(lbl,bar.x+5,bar.y);}
      else{ctx.textAlign='right';ctx.fillText(lbl,bar.x-5,bar.y);}
      ctx.restore();
    });
  }};

  const ctx=el.getContext('2d');
  chartLinBar=new Chart(ctx,{type:'bar',plugins:[kgPlugin],
    data:{labels,datasets:[{label:'KG Desvío',data:vals,backgroundColor:colors,borderRadius:4,borderSkipped:false,barThickness:14}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      layout:{padding:{right:160, left:10}},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#0f1320',borderColor:'#1c2236',borderWidth:1,
        bodyFont:{family:'Space Mono',size:12},bodyColor:'#fff',
        callbacks:{
          label:c=>`  KG acum: ${(vals[c.dataIndex]>=0?'+':'')+fmtN(vals[c.dataIndex])}`,
          afterLabel:c=>`  % Desvío prom: ${fmtPct(pcts[c.dataIndex])}`
        }}},
      scales:{
        x:{grid:{color:'rgba(28,34,54,.7)'},ticks:{color:'#7a82a0',font:{family:'Space Mono',size:9},callback:v=>fmtN(v)+' kg'}},
        y:{grid:{display:false},ticks:{color:'#fff',font:{size:10},autoSkip:false},afterFit(axis){axis.width=190;}}}}});
}

function selLinea(idx,el){
  document.querySelectorAll('.litem').forEach(x=>x.classList.remove('sel'));
  if(el)el.classList.add('sel');
  const l=LINEAS[idx];if(!l)return;
  const det=(LINEA_DET[l.linea]||[]).slice().sort((a,b)=>b.avg_desvio-a.avg_desvio);
  const detHTML=det.length
    ?`<div style="padding:8px 14px;background:rgba(0,212,255,.04);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px">
        <span style="font-size:8px;font-family:var(--mono);color:var(--cyan);text-transform:uppercase;letter-spacing:1.2px">Acumulado 2026 — ${l.linea}</span>
        <span style="font-size:10px;color:var(--text2)">${det.length} código(s) · ${det.reduce((s,r)=>s+r.n,0)} registros</span>
      </div>
      <table><thead><tr>
        <th>Código PT</th><th>Semielaborado</th>
        <th style="text-align:right">KG Desvío Acum.</th>
        <th style="text-align:right">% Desvío Acum.</th>
      </tr></thead><tbody>${det.map(r=>`<tr>
        <td class="num" style="font-size:10px;color:var(--text2)">${r.codigo_pt}</td>
        <td style="font-size:11px">${r.semielab||'—'}</td>
        <td class="${cc(r.total_kg)}" style="text-align:right">${(r.total_kg>=0?'+':'')+fmtN(r.total_kg)} kg</td>
        <td class="num" style="text-align:right;color:#ffffff">${fmtPct(r.avg_desvio)}</td>
      </tr>`).join('')}</tbody></table>`
    :`<div class="nodata" style="padding:14px">Sin datos para esta línea</div>`;
  document.getElementById('lineaDet').innerHTML=`
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:11px 15px;background:var(--surf);border-bottom:1px solid var(--border)">
        <div style="font-size:9px;font-family:var(--mono);color:var(--cyan);text-transform:uppercase;letter-spacing:1.5px">${l.linea}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:3px">
          % Desvío prom: <span class="${cc(l.avg_desvio)}">${fmtPct(l.avg_desvio)}</span>
          &nbsp;·&nbsp; KG acum: <span class="${cc(l.total_kg)}">${(l.total_kg>=0?'+':'')+fmtN(l.total_kg)} kg</span>
          &nbsp;·&nbsp; Registros: ${l.count}
        </div>
      </div>
      <div style="max-height:420px;overflow-y:auto">${detHTML}</div>
    </div>`;
}

// =================== INIT ===================
renderLineas();
</script>

<!-- SheetJS para leer Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// =================== UPLOAD MODAL ===================
let _pendingFile = null;










function handleFile(file){
  const valid = /\.(xlsx|xls)$/i.test(file.name);
  document.getElementById('upFileName').textContent = '📄 ' + file.name;
  const statusEl = document.getElementById('upStatus');
  if(!valid){
    statusEl.textContent = '⚠️ Solo se aceptan archivos .xlsx o .xls';
    statusEl.className = 'up-status err';
    document.getElementById('btnProcesar').disabled = true;
    _pendingFile = null;
    return;
  }
  statusEl.textContent = 'Archivo listo para procesar.';
  statusEl.className = 'up-status ok';
  document.getElementById('btnProcesar').disabled = false;
  _pendingFile = file;
}


</script>



<script>
/* ===== FILTRO PRO NIVEL DIRECTOR ===== */
window._currentCode=window._currentCode||null;
function getWeek(d){var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));return Math.ceil((((t-new Date(Date.UTC(t.getUTCFullYear(),0,1)))/864e5)+1)/7)}
function getWeekLabel(val){if(!val)return'';if(val.indexOf('-S')>=0){var p=val.split('-S');return'Semana '+p[1]+' - '+p[0];}if(val.length===7){var m=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];var pp=val.split('-');return m[parseInt(pp[1])-1]+' '+pp[0];}return val;}
function applyFilter(){var code=window._currentCode;if(!code||!HIST[code])return;var series=[].concat(HIST[code].series);var tipo=document.getElementById('filterTipo').value;var sel=document.getElementById('filterValor');var btn=document.getElementById('btnReset');var lbl=document.getElementById('filterLabel');var values=[],st;if(tipo==='year'){st=new Set();series.forEach(function(x){st.add(new Date(x.fecha).getFullYear())});values=Array.from(st).sort();}if(tipo==='month'){st=new Set();series.forEach(function(x){var d=new Date(x.fecha);st.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'))});values=Array.from(st).sort();}if(tipo==='week'){st=new Set();series.forEach(function(x){var d=new Date(x.fecha);st.add(d.getFullYear()+'-S'+String(getWeek(d)).padStart(2,'0'))});values=Array.from(st).sort();}if(tipo!=='all'){sel.style.display='inline-block';btn.style.display='inline-block';var prev=sel.value;sel.innerHTML=values.map(function(v){return'<option value="'+v+'">'+v+'</option>'}).join('');if(values.indexOf(prev)>=0)sel.value=prev;else sel.value=values[values.length-1];}else{sel.style.display='none';sel.innerHTML='';btn.style.display='none';lbl.style.display='none';rebuildChartFiltrado(series);return;}var val=sel.value;lbl.style.display='inline-block';lbl.textContent='Mostrando: '+getWeekLabel(val);if(tipo==='year')series=series.filter(function(x){return new Date(x.fecha).getFullYear()==val});if(tipo==='month')series=series.filter(function(x){var d=new Date(x.fecha);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')===val});if(tipo==='week')series=series.filter(function(x){var d=new Date(x.fecha);return d.getFullYear()+'-S'+String(getWeek(d)).padStart(2,'0')===val});rebuildChartFiltrado(series);}
function resetFilter(){document.getElementById('filterTipo').value='all';document.getElementById('filterValor').style.display='none';document.getElementById('filterValor').innerHTML='';document.getElementById('btnReset').style.display='none';document.getElementById('filterLabel').style.display='none';var code=window._currentCode;if(code&&HIST[code])rebuildChartFiltrado(HIST[code].series);}
function rebuildChartFiltrado(series){if(typeof chartHist!=='undefined'&&chartHist)chartHist.destroy();var container=document.getElementById('histChart');if(!container){var wrap=document.querySelector('.nodata');if(wrap&&wrap.parentElement){wrap.parentElement.innerHTML='<canvas id="histChart"></canvas>';container=document.getElementById('histChart');}}if(!series||!series.length){if(container)container.parentElement.innerHTML='<div class="nodata">Sin datos para este filtro</div>';return;}var labels=series.map(function(s){var p=s.fecha.slice(5).split('-');return p[1]+'/'+p[0]});var vals=series.map(function(s){return+(s.desvio*-1).toFixed(4)});var kgs=series.map(function(s){return s.kg||0});var colors=kgs.map(function(k){return k>0?'rgba(0,229,160,0.88)':k<0?'rgba(255,77,77,0.88)':'rgba(122,130,160,0.5)'});var kgP={id:'kgF',afterDatasetDraw:function(ch){ch.getDatasetMeta(0).data.forEach(function(bar,i){var kg=kgs[i];if(!kg)return;ch.ctx.save();ch.ctx.font='bold 9.5px Space Mono';ch.ctx.fillStyle='rgba(255,255,255,0.85)';ch.ctx.textAlign='center';ch.ctx.textBaseline=vals[i]>=0?'bottom':'top';ch.ctx.fillText((kg>0?'+':'')+kg.toFixed(0)+' kg',bar.x,vals[i]>=0?bar.y-2:bar.y+2);ch.ctx.restore()})}};var ctx=container.getContext('2d');chartHist=new Chart(ctx,{type:'bar',plugins:[kgP],data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:600,easing:'easeOutQuart'},plugins:{legend:{display:false},tooltip:{backgroundColor:'#0f1320',borderColor:'#1c2236',borderWidth:1,titleColor:'#7a82a0',bodyColor:'#fff',bodyFont:{family:'Space Mono',size:12},callbacks:{label:function(c){return' % Desvio: '+(c.raw>=0?'+':'')+c.raw.toFixed(2)+'%'},afterLabel:function(c){return' KG: '+fmtN(kgs[c.dataIndex])+' $ '+fmtN((series[c.dataIndex]||{}).costo)}}}},scales:{x:{grid:{color:'rgba(28,34,54,.7)'},ticks:{color:'#fff',font:{family:'Space Mono',size:9},maxRotation:55}},y:{grid:{color:'rgba(28,34,54,.7)'},ticks:{color:'#7a82a0',font:{family:'Space Mono',size:9},callback:function(v){return v.toFixed(2)+'%'}}}}}});}
document.addEventListener('click',function(e){if(e.target&&e.target.classList&&e.target.classList.contains('sbtn')){setTimeout(function(){if(!window._currentCode)return;document.getElementById('filterTipo').value='week';applyFilter();},400);}});
var _oSC=window.selectCode;window.selectCode=function(c){_oSC(c);setTimeout(function(){if(!window._currentCode)return;document.getElementById('filterTipo').value='week';applyFilter();},400);};
</script>
